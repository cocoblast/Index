// ── SCORING ENGINE V6 (COMPLETE) ──────────────────────────────────────────────────────────────────────────────────────
function computeDiagnosis(snapshot) {
  const scores = {
    core01: scoreCore01_Growth(snapshot),
    core02: scoreCore02_Activation(snapshot),
    core03: scoreCore03_Reliability(snapshot),
    core04: scoreCore04_Economics(snapshot),
    core05: scoreCore05_AIMoat(snapshot)
  };
  
  const overall = Math.round(Object.values(scores).reduce((sum, s) => sum + (s.score || 0), 0) / 5);
  const priority = generatePriorityCard(scores, snapshot);
  
  return { snapshot, scores, overall, priority, timestamp: Date.now() };
}

function scoreCore01_Growth(s) {
  let pts = 0, total = 100;
  const churn = parseFloat(s.churn_rate_pct || 0);
  pts += Math.max(0, Math.min(70, (3 - churn) * 23.33)); // Churn <3% = 70pts
  const mrr = parseFloat(s.mrr_usd || 0);
  pts += mrr >= 10000 ? 30 : mrr >= 2000 ? 18 : 8;
  return { score: Math.round(pts), band: pts >= 70 ? 'healthy' : pts >= 40 ? 'warning' : 'bad', keyMetric: `Churn ${churn}%` };
}

function scoreCore02_Activation(s) {
  let pts = 0, total = 100;
  const act = parseFloat(s.activation_rate_pct || 0);
  pts += Math.min(60, (act / 60) * 60);
  const onb = parseFloat(s.onboarding_days || 99);
  pts += Math.min(40, Math.max(0, (7 / onb) * 40));
  return { score: Math.round(pts), band: pts >= 70 ? 'healthy' : pts >= 40 ? 'warning' : 'bad' };
}

function scoreCore03_Reliability(s) {
  let pts = 0;
  const uptime = parseFloat(s.uptime_pct || 0);
  pts += Math.min(70, (uptime / 99) * 70);
  const bugs = parseFloat(s.bug_rate_weekly || 99);
  pts += Math.min(30, Math.max(0, (5 - bugs) * 6));
  return { score: Math.round(pts), band: pts >= 70 ? 'healthy' : pts >= 40 ? 'warning' : 'bad' };
}

function scoreCore04_Economics(s) {
  let pts = 0;
  const cac = parseFloat(s.cac_usd || 999);
  const ltv = parseFloat(s.ltv_usd || 0);
  const ratio = ltv / cac;
  pts += Math.min(60, ratio * 20);
  const burn = parseFloat(s.burn_rate_pct || 100);
  pts += Math.min(40, Math.max(0, (30 - burn) * 1.33));
  return { score: Math.round(pts), band: pts >= 70 ? 'healthy' : pts >= 40 ? 'warning' : 'bad' };
}

function scoreCore05_AIMoat(s) {
  let pts = 0;
  const aiRisk = s.ai_substitution_risk || 'high';
  pts += aiRisk === 'low' ? 50 : aiRisk === 'medium' ? 25 : 0;
  const agentic = parseInt(s.agentic_readiness || 1);
  pts += (agentic - 1) * 10;
  return { score: Math.min(100, pts), band: pts >= 70 ? 'healthy' : pts >= 40 ? 'warning' : 'bad' };
}

function generatePriorityCard(scores, snapshot) {
  const lowest = Object.entries(scores).reduce((a, b) => (a[1].score || 0) < (b[1].score || 0) ? a : b);
  const coreName = lowest[0].replace('core', 'Core ');
  
  return {
    title: `${coreName} Needs Urgent Attention`,
    context: `Your ${lowest[0]} scored ${lowest[1].score}/100. This is your biggest bottleneck this week.`,
    action: `Focus 80% of your time this week on ${coreName.toLowerCase()}. Delegate everything else.`,
    badge: lowest[1].band === 'healthy' ? 'OK' : lowest[1].band === 'warning' ? 'WARNING' : 'CRITICAL'
  };
}

// ── AI SPARRING (FULLY WORKING) ───────────────────────────────────────────────────────────────────────────────────────
async function openSparring() {
  const context = document.getElementById('pcContext').textContent || TEXTS[lang].sparringContext;
  document.getElementById('sparringContext').textContent = context;
  document.getElementById('sparringModal').classList.add('open');
}

async function runSparring() {
  const prompt = document.getElementById('sparringPrompt').value;
  const apiKeyInput = document.getElementById('modalApiKey').value || apiKey;
  
  if (!apiKeyInput.startsWith('sk-ant-')) {
    document.getElementById('sparringResponse').innerHTML = '<span style="color:var(--danger)">❌ Masukkan Anthropic API Key yang valid (sk-ant-...)</span>';
    document.getElementById('sparringResponse').classList.add('visible');
    return;
  }

  document.getElementById('sparringLoader').classList.add('visible');
  document.getElementById('sparringResponse').classList.remove('visible');
  
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKeyInput,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20241022',
        max_tokens: 1000,
        temperature: 0.7,
        messages: [{
          role: 'user',
          content: `CONTEXT: ${document.getElementById('sparringContext').textContent}\n\nUSER: ${prompt || 'Bagaimana cara memperbaiki prioritas issue ini minggu ini?'}\n\nBerikan jawaban konkret, actionable, dan spesifik untuk founder AI startup. Gunakan format:\n\n🔥 PRIORITY ACTION\n• [3 actionable steps]\n\n📊 EXPECTED IMPACT\n• [metrics yang akan improve]`
        }]
      })
    });
    
    const data = await response.json();
    if (data.content && data.content[0].text) {
      document.getElementById('sparringResponse').textContent = data.content[0].text;
    } else {
      throw new Error('Invalid response format');
    }
  } catch (error) {
    document.getElementById('sparringResponse').innerHTML = 
      `<span style="color:var(--danger)">❌ Error: ${error.message}</span><br><br>
       <span style="color:var(--text2);font-size:9px;">Tips: 
       1. Cek API key di anthropic.com/api
       2. Pastikan ada cukup credits
       3. Coba lagi dalam 10 detik</span>`;
  }
  
  document.getElementById('sparringResponse').classList.add('visible');
  document.getElementById('sparringLoader').classList.remove('visible');
}

function closeSparring() {
  document.getElementById('sparringModal').classList.remove('open');
  document.getElementById('sparringResponse').classList.remove('visible');
  document.getElementById('sparringPrompt').value = '';
}

// ── CSV HANDLING ─────────────────────────────────────────────────────────────────────────────────────────────────────
function handleFileInput(input) {
  const file = input.files[0];
  if (file) {
    Papa.parse(file, {
      header: true,
      complete: function(results) {
        if (results.data.length > 0) {
          pendingSnapshot = results.data[0];
          renderPreview(results.data[0]);
        }
      }
    });
  }
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.csv')) {
    const reader = new FileReader();
    reader.onload = function(e) {
      Papa.parse(e.target.result, {
        header: true,
        complete: function(results) {
          if (results.data.length > 0) {
            pendingSnapshot = results.data[0];
            renderPreview(results.data[0]);
          }
        }
      });
    };
    reader.readAsText(file);
  }
}

function renderPreview(data) {
  const preview = document.getElementById('previewRows');
  let table = '<table class="preview-table"><thead><tr>';
  Object.keys(data).forEach(key => table += `<th>${key}</th>`);
  table += '</tr></thead><tbody><tr>';
  Object.values(data).forEach(val => table += `<td>${val}</td>`);
  table += '</tr></tbody></table>';
  preview.innerHTML = table;
  document.getElementById('csvPreview').classList.add('visible');
}

    stage: document.getElementById('m_stage').value

  const diagnosis = computeDiagnosis(snapshot);

}

// ── DASHBOARD RENDER ─────────────────────────────────────────────────────────────────────────────────────────────────

  const p = diagnosis.priority;
  
  // Meta
  document.getElementById('metaDate').textContent = s.snapshot_date || 'Today';
  document.getElementById('metaIndustry').textContent = s.stage?.toUpperCase() || 'AI-SAAS';
  
  // Priority Card
  document.getElementById('pcTitle').textContent = p.title;
  document.getElementById('pcContext').textContent = p.context;
  document.getElementById('pcAction').textContent = p.action;
  document.getElementById('pcBadge').textContent = p.badge;
  document.getElementById('pcBadge').className = `badge badge-${p.badge.toLowerCase()}`;
  
  // 5 Cores
  const coresGrid = document.getElementById('coresGrid');
  coresGrid.innerHTML = `
    <div class="core-mini"><div class="core-mini-num">01</div><div class="core-mini-name">Growth</div><div class="core-mini-score">${scores.core01.score}<span>/100</span></div><div class="core-mini-indicator ${scores.core01.band}">${scores.core01.band}</div></div>
    <div class="core-mini"><div class="core-mini-num">02</div><div class="core-mini-name">Activation</div><div class="core-mini-score">${scores.core02.score}<span>/100</span></div><div class="core-mini-indicator ${scores.core02.band}">${scores.core02.band}</div></div>
    <div class="core-mini"><div class="core-mini-num">03</div><div class="core-mini-name">Reliability</div><div class="core-mini-score">${scores.core03.score}<span>/100</span></div><div class="core-mini-indicator ${scores.core03.band}">${scores.core03.band}</div></div>
    <div class="core-mini"><div class="core-mini-num">04</div><div class="core-mini-name">Economics</div><div class="core-mini-score">${scores.core04.score}<span>/100</span></div><div class="core-mini-indicator ${scores.core04.band}">${scores.core04.band}</div></div>
    <div class="core-mini"><div class="core-mini-num">05</div><div class="core-mini-name">AI Moat</div><div class="core-mini-score">${scores.core05.score}<span>/100</span></div><div class="core-mini-indicator ${scores.core05.band}">${scores.core05.band}</div></div>
  `;
  
  document.getElementById('dashEmpty').style.display = 'none';
  document.getElementById('dashContent').style.display = 'block';
}

function submitSnapshot() {
  if (pendingSnapshot) {
    const diagnosis = computeDiagnosis(pendingSnapshot);
    renderDashboard(diagnosis);
    sessions.push(diagnosis);
    localStorage.setItem('cb_v6_sessions', JSON.stringify(sessions));
    document.getElementById('csvPreview').classList.remove('visible');
  }
}
