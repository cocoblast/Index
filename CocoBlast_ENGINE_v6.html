<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CocoBlast Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>Selamat datang di CocoBlast Engine</h1>
    <p>Silakan masukkan informasi Anda di bawah ini:</p>
    <label for="apiKey">API Key:</label>
    <input type="text" id="apiKey" placeholder="Masukkan API Key Hugging Face atau Anthropic">
    <button onclick="startSparring()">Mulai Sparring AI</button>

    <div id="sparringResults"></div>

    <script>
        function startSparring() {
            const apiKey = document.getElementById('apiKey').value;
            const provider = apiKey.startsWith('hf-') ? 'huggingface' : 'anthropic'; // Determine provider based on API key

            axios.post(`https://${provider}.api.endpoint/spar`, { apiKey })
                .then(response => {
                    document.getElementById('sparringResults').innerHTML = `<p>${response.data}</p>`;
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('sparringResults').innerHTML = `<p>Terjadi kesalahan saat memulai sparring AI.</p>`;
                });
        }
    </script>
</body>
</html>
